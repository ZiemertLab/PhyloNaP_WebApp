<style>
    .centered-page-container {
        min-height: 80vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .form-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 20px;
        text-align: center;
    }

    .form-container textarea,
    .form-container input[type="file"],
    .form-container input[type="email"],
    .form-container input[type="submit"] {
        margin-bottom: 10px;
        width: 600px;
        max-width: 90vw;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

    .example-btn {
        margin-top: 10px;
        margin-bottom: 20px;
        background-color: var(--bright-color, #7B1B38);
        color: var(--background-light, #E0E0E0);
        border: none;
        border-radius: 5px;
        padding: 6px 18px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
    }

    .example-btn:hover {
        background-color: #a61e37;
    }

    .explanation {
        max-width: 600px;
        margin: 30px auto 10px auto;
        text-align: center;
        color: #333;
        font-size: 1.08em;
    }

    .warning-message {
        background-color: rgba(123, 27, 56, 0.08);
        border-left: 4px solid #7B1B38;
        color: #7B1B38;
        padding: 12px 18px;
        margin: 20px auto 10px auto;
        max-width: 600px;
        border-radius: 6px;
        font-size: 1em;
        text-align: center;
    }

    .gbk-section {
        margin-top: 18px;
        padding: 14px 18px;
        background: rgba(123, 27, 56, 0.04);
        border: 1px dashed #7B1B38;
        border-radius: 8px;
        max-width: 600px;
        width: 100%;
    }

    .gbk-section label {
        font-weight: 500;
        font-size: 0.97em;
        color: #333;
    }

    .gbk-status {
        margin-top: 6px;
        font-size: 0.93em;
        color: #555;
    }

    .gbk-status.error {
        color: #c0392b;
    }

    .gbk-status.success {
        color: #27ae60;
    }
</style>

<script>
document.getElementById('gbk-upload').addEventListener('change', async function() {
    const file = this.files[0];
    const statusEl = document.getElementById('gbk-status');
    if (!file) return;

    statusEl.textContent = 'Parsing GenBank file...';
    statusEl.className = 'gbk-status';

    const formData = new FormData();
    formData.append('gbk_file', file);

    try {
        const resp = await fetch('/parse_gbk', { method: 'POST', body: formData });
        const data = await resp.json();
        if (!resp.ok) {
            statusEl.textContent = data.error || 'Failed to parse file';
            statusEl.className = 'gbk-status error';
            return;
        }
        document.getElementById('example-seq').value = data.fasta;
        statusEl.textContent = `Extracted ${data.protein_count} protein sequence(s) from GenBank file.`;
        statusEl.className = 'gbk-status success';
    } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
        statusEl.className = 'gbk-status error';
    }
});
</script>
